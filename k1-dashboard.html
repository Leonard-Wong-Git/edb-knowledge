  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function buildAdminSnapshot(data, reviewState) {
  return {
    schema_version: '1.0',
    exported_at: new Date().toISOString(),
    data: deepClone(data),
    review_state: { ...reviewState },
  };
}

function migrateSnapshot(parsed) {
  // v1→v2: rename department_head → subject_head in data and review_state
  function renameKey(obj, oldK, newK) {
    if (!obj || typeof obj !== 'object') return obj;
    const out = {};
    for (const [k, v] of Object.entries(obj)) {
      out[k === oldK ? newK : k] = (typeof v === 'object' && v !== null) ? renameKey(v, oldK, newK) : v;
    }
    return out;
  }
  if (parsed.data) parsed.data = renameKey(parsed.data, 'department_head', 'subject_head');
  if (parsed.review_state) {
    const rs = {};
    for (const [k, v] of Object.entries(parsed.review_state)) {
      rs[k.replace('department_head', 'subject_head')] = v;
    }
    parsed.review_state = rs;
  }
  return parsed;
}

function loadLocalSnapshot() {
  try {
    const raw = localStorage.getItem(LOCAL_SNAPSHOT_KEY);
    if (!raw) return null;
    let parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return null;
    if (!parsed.data || !parsed.review_state) return null;
    parsed = migrateSnapshot(parsed);
    return {
      data: parsed.data,
      reviewState: parsed.review_state,
    };
  } catch {
    return null;
  }
}

function downloadJson(filename, payload) {
  const blob = new Blob([payload], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function ExportModal({ isOpen, onClose, data, reviewState }) {
  const [exportKind, setExportKind] = useState('approved');

  useEffect(() => {
    if (isOpen) setExportKind('approved');
  }, [isOpen]);

  // Build export data with only approved facts
  const approvedExport = useMemo(() => {
    const out = { _meta: { ...data._meta } };
    let approvedCount = 0;
    let skippedCount = 0;
    Object.entries(data).forEach(([tid, td]) => {
      if (tid === '_meta') return;
      const topicOut = {};
      // Copy meta fields
      Object.entries(td).forEach(([k, v]) => {
        if (k.startsWith('_')) { topicOut[k] = v; return; }
        if (!Array.isArray(v)) return;
        const approved = v.filter((_, i) => reviewState[makeKey(tid, k, i)] === 'approved');
        if (approved.length > 0 || k === 'all_roles') {
          topicOut[k] = approved;
          approvedCount += approved.length;
        }
        skippedCount += v.length - approved.length;
      });
      out[tid] = topicOut;
    });
    return { json: out, approvedCount, skippedCount };
  }, [data, reviewState]);

  const adminSnapshot = useMemo(() => {
    return buildAdminSnapshot(data, reviewState);
  }, [data, reviewState]);

  if (!isOpen) return null;

  const previewJson = exportKind === 'approved'
    ? JSON.stringify(approvedExport.json, null, 2)
    : JSON.stringify(adminSnapshot, null, 2);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-2xl mx-4 max-h-screen overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-lg font-bold text-gray-800">匯出與備份</h3>
        </div>

        <div className="mb-3 px-3 py-2 bg-blue-50 border border-blue-200 rounded-lg">

            你在管理員模式的編輯與審批，會自動保存到目前瀏覽器。若要永久寫回 GitHub repo，請下載「管理快照」再回寫。
          </p>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
          <div
            onClick={() => setExportKind('approved')}
            className={`text-left p-4 rounded-xl border cursor-pointer ${exportKind === 'approved' ? 'border-teal-400 bg-teal-50' : 'border-gray-200 bg-white hover:bg-gray-50'}`}>
            <div className="flex items-center justify-between gap-3 mb-2">
              <h4 className="text-sm font-semibold text-gray-800">發布版 role_facts.json</h4>
              <button

            <div className="flex gap-2 text-xs">

function AdminPasswordModal({ isOpen, onClose, onSuccess }) {
  const [pw, setPw] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);

  useEffect(() => { if (isOpen) { setPw(''); setError(''); } }, [isOpen]);
  if (!isOpen) return null;

  const handleSubmit = async (e) => {
    e.preventDefault();
    setChecking(true);
    setError('');
    const hash = await sha256(pw);
    if (hash === ADMIN_HASH) {
      onSuccess();
      onClose();
    } else {
      setError('密碼錯誤，請再試。');
    }
    setChecking(false);
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
      <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-xs mx-4">
        <h3 className="text-base font-bold text-gray-800 mb-1">🔒 管理員登入</h3>
        <p className="text-xs text-gray-500 mb-4">輸入管理員密碼以啟用增刪審批功能</p>
        <form onSubmit={handleSubmit}>
          <input
            type="password"
            value={pw}
            onChange={e => setPw(e.target.value)}
            placeholder="密碼"
            autoFocus
            className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-2 focus:ring-2 focus:ring-teal-500 focus:border-transparent"
          />
          {error && <p className="text-xs text-red-600 mb-2">{error}</p>}
          <div className="flex gap-2 mt-2">
            <button type="button" onClick={onClose}
                    className="flex-1 px-3 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">
              取消
            </button>
            <button type="submit" disabled={checking || pw.length === 0}
                    className="flex-1 px-3 py-2 text-sm bg-teal-600 text-white rounded-lg hover:bg-teal-700 disabled:opacity-50">
              {checking ? '驗證中…' : '確認'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function GuidelinesPanel() {
  const [activeCat, setActiveCat] = useState('all');
  const [activeLevel, setActiveLevel] = useState('all');
  const [searchQ, setSearchQ] = useState('');
  const [sortBy, setSortBy] = useState('year-desc'); // 'year-desc' | 'year-asc' | 'title'

  const CATS = [
    { key: 'all',   label: '全部',   icon: '📋' },
    { key: '課程',   label: '課程',   icon: '📚' },
    { key: '財務採購', label: '財務採購', icon: '💰' },
    { key: '人力資源', label: '人力資源', icon: '👥' },
    { key: '學生事務', label: '學生事務', icon: '🎒' },
    { key: '學生安全', label: '學生安全', icon: '🛡️' },
    { key: '安全',   label: '科目安全', icon: '⚠️' },
    { key: '活動',   label: '活動',   icon: '🏃' },
    { key: '津貼',   label: '津貼',   icon: '🏷️' },
    { key: '行政',   label: '行政',   icon: '🏫' },
    { key: '資訊科技', label: '資訊科技', icon: '💻' },
  ];

  const catCounts = useMemo(() => {
    const counts = { all: GUIDELINES_REGISTRY.length };
    GUIDELINES_REGISTRY.forEach(g => { counts[g.category] = (counts[g.category] || 0) + 1; });
    return counts;
  }, []);

  const LEVELS = ['幼稚園', '小學', '中學', '特殊', '跨階段'];

  const filtered = useMemo(() => {
    let list = GUIDELINES_REGISTRY.filter(g => {
      if (activeCat !== 'all' && g.category !== activeCat) return false;
      if (activeCat === '課程' && activeLevel !== 'all' && g.level !== activeLevel) return false;
      if (searchQ && !g.title.includes(searchQ) && !g.titleShort.includes(searchQ)) return false;
      return true;
    });
    if (sortBy === 'year-desc') list = [...list].sort((a, b) => parseInt(b.year) - parseInt(a.year));
    else if (sortBy === 'year-asc') list = [...list].sort((a, b) => parseInt(a.year) - parseInt(b.year));
    else if (sortBy === 'title') list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'zh-HK'));
    return list;
  }, [activeCat, activeLevel, searchQ, sortBy]);

  const activeCatLabel = CATS.find(c => c.key === activeCat)?.label || '全部';

  const formatBadge = (fmt) => {
    if (fmt === 'PDF') return { bg: 'bg-red-50', text: 'text-red-600', border: 'border-red-200' };
    if (fmt === 'HTML') return { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200' };
    return { bg: 'bg-gray-50', text: 'text-gray-600', border: 'border-gray-200' };
  };

  // Use light backgrounds + dark text so year is always legible regardless of card border color
  const yearColor = (yr) => {
    const y = parseInt(yr);
    if (!yr || isNaN(y)) return 'bg-gray-100 text-gray-500';
    if (y >= 2024) return 'bg-emerald-100 text-emerald-800 font-extrabold';
    if (y >= 2020) return 'bg-sky-100 text-sky-800 font-bold';
    if (y >= 2015) return 'bg-amber-100 text-amber-800';

// ── Q&A Panel ──
function QAPanel({ data }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [searched, setSearched] = useState(false);

  const TOPIC_LABELS = {
    finance: '財務/採購', hr: '人力資源', curriculum: '課程',
    activity: '活動', student: '學生事務', it: '資訊科技', general: '通用/行政'
  };

  const EXAMPLE_QUERIES = ['採購門檻', 'CPD 時數', '反欺凌', '境外活動', 'BYOD', '法團校董會'];

  const runSearch = useCallback((q) => {
    const trimmed = q.trim();
    if (!trimmed) return;
    const tokens = trimmed.split(/[\s，,、]+/).filter(t => t.length > 0);
    const found = [];
    Object.entries(data).forEach(([topicId, topicData]) => {
      if (topicId === '_meta') return;
      const sources = topicData._sources || [];
      const sourceMap = topicData._sourceMap || {};
      ROLE_ORDER.forEach(roleId => {
        const facts = topicData[roleId];
        if (!Array.isArray(facts)) return;
        facts.forEach((fact, idx) => {
          const matchCount = tokens.filter(t => fact.includes(t)).length;
          if (matchCount > 0) {
            const srcIdx = sourceMap[`${roleId}.${idx}`];
            const sourceRef = (srcIdx !== undefined && sources[srcIdx]) ? sources[srcIdx] : null;
            found.push({ topicId, roleId, fact, index: idx, sourceRef, score: matchCount });
          }
        });
      });
    });
    found.sort((a, b) => b.score - a.score);
    setResults(found);
    setSearched(true);
  }, [data]);

  const handleSearch = () => runSearch(query);

  const highlightFact = (fact, tokens) => {
    if (!tokens || tokens.length === 0) return fact;
    const pattern = tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    const parts = fact.split(new RegExp(`(${pattern})`, 'g'));
    return parts.map((part, i) =>
      tokens.includes(part)
        ? <mark key={i} className="qa-highlight">{part}</mark>
        : part
    );
  };

  const tokens = searched ? query.trim().split(/[\s，,、]+/).filter(t => t.length > 0) : [];

  return (
    <div className="flex-1 min-w-0">
      {/* Search box */}
      <div className="bg-white rounded-xl border border-gray-200 p-5 mb-4">
        <h2 className="text-lg font-bold text-gray-800 mb-1">智能搜尋</h2>
        <p className="text-xs text-gray-400 mb-3">輸入問題或關鍵詞，即時搜尋 {Object.keys(data).filter(k => k !== '_meta').reduce((s, k) => {
          const td = data[k];
          return s + ROLE_ORDER.reduce((n, r) => n + (Array.isArray(td[r]) ? td[r].length : 0), 0);
        }, 0)} 條 EDB 知識庫事實</p>
        <div className="flex gap-2 mb-3">
          <input type="text" value={query}
                 onChange={e => setQuery(e.target.value)}
                 onKeyDown={e => e.key === 'Enter' && handleSearch()}
                 placeholder="例如：採購門檻、CPD 時數、反欺凌指引..."
                 className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
          <button onClick={handleSearch}
                  className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 font-medium">
            搜尋
          </button>
          {query && (
            <button onClick={() => { setQuery(''); setResults([]); setSearched(false); }}
                    className="px-3 py-2 text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg">
              清除
            </button>
          )}
        </div>
        {/* Example chips */}
        {!searched && (
          <div className="flex flex-wrap gap-2">
            <span className="text-xs text-gray-400 self-center">快速搜尋：</span>
            {EXAMPLE_QUERIES.map(eq => (
              <button key={eq} onClick={() => { setQuery(eq); runSearch(eq); }}
                      className="text-xs px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-100">
                {eq}
              </button>
            ))}
          </div>
        )}
        {searched && (
          <p className="text-xs text-gray-400">
            {results.length > 0 ? `找到 ${results.length} 條相關事實` : '找不到相關事實，請嘗試其他關鍵詞'}
          </p>
        )}
      </div>

      {/* Results / Empty state */}
      {!searched ? (
        <div className="bg-white rounded-xl border border-gray-200 p-10 text-center text-gray-300">
          <p className="text-4xl mb-3">🔍</p>
          <p className="text-sm text-gray-400">輸入問題或關鍵詞，搜尋 EDB 相關規定</p>
        </div>
      ) : results.length === 0 ? (
        <div className="bg-white rounded-xl border border-gray-200 p-10 text-center text-gray-300">
          <p className="text-3xl mb-3">🤷</p>
          <p className="text-sm text-gray-400">找不到相關事實，請嘗試不同關鍵詞</p>
        </div>
      ) : (
        <div className="space-y-3">
          {results.map((item, i) => (
            <div key={i} className="qa-result-card bg-white rounded-lg p-4 border border-gray-200 animate-in">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-xs px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700 font-medium">
                  {TOPIC_LABELS[item.topicId] || item.topicId}
                </span>
                <RoleBadge roleId={item.roleId} />
              </div>
              <p className="text-sm text-gray-800 mb-2">{highlightFact(item.fact, tokens)}</p>
              {item.sourceRef && (
                <a href={item.sourceRef.url} target="_blank" rel="noopener"
                   className="source-link inline-flex items-center gap-1">
                  <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                  </svg>
                  {item.sourceRef.title}
                </a>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CircularAnalysisPanel() {

  const [circularText, setCircularText] = useState('');
  const [role, setRole] = useState('principal');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const TOPIC_LABELS = {
    finance: '財務/採購', hr: '人力資源', curriculum: '課程',
    activity: '活動', student: '學生事務', it: '資訊科技', general: '通用/行政'
  };

  const ROLE_OPTIONS = [
    { value: 'principal',       label: '校長' },
    { value: 'vice_principal',  label: '副校長' },
    { value: 'panel_chair',  label: '學位主任' },
    { value: 'subject_head', label: '科主任' },
    { value: 'teacher',         label: '教師' },
    { value: 'eo_admin',        label: '行政主任' },
    { value: 'supplier',        label: '供應商' },
    { value: 'all_roles',       label: '全部角色' },
  ];

  const handleAnalyze = async () => {
    if (!circularText.trim()) return;
    setLoading(true);
    setError(null);
    setResult(null);
    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ circular_text: circularText, role }),
      });
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
      setResult(body);
    } catch (err) {
      setError(err.message || '無法連接後端，請確認本地伺服器已啟動。');
    } finally {
      setLoading(false);
    }
  };

  const handleClear = () => { setResult(null); setError(null); };

  return (
    <div className="flex-1 min-w-0">
      {/* Input card */}
      <div className="bg-white rounded-xl border border-gray-200 p-5 mb-4">

        <p className="text-xs text-gray-300 mb-4">
          後端需在本地運行：<code className="bg-gray-100 text-gray-500 px-1 rounded">cd backend &amp;&amp; OPENAI_API_KEY=sk-... npm run dev</code>
        </p>
        <textarea
          value={circularText}

          className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-violet-500 focus:border-transparent resize-y mb-3 font-mono" />
        <div className="flex items-center gap-3 flex-wrap">
          <select
            value={role}
            onChange={e => setRole(e.target.value)}
            className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-violet-500 focus:border-transparent">
            {ROLE_OPTIONS.map(opt => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
          <button
            onClick={handleAnalyze}
            disabled={loading || !circularText.trim()}
            className="px-4 py-1.5 bg-violet-600 text-white text-sm rounded-lg hover:bg-violet-700 font-medium disabled:opacity-40 disabled:cursor-not-allowed">
            {loading ? '分析中…' : '開始分析'}
          </button>
          {(result || error) && (
            <button onClick={handleClear}
                    className="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg">
              清除結果
            </button>
          )}
        </div>
      </div>

      {/* Loading */}
      {loading && (
        <div className="bg-white rounded-xl border border-gray-200 p-10 text-center text-gray-400">
          <p className="text-3xl mb-3" style={{animation:'pulse 1.5s ease-in-out infinite'}}>⚙️</p>
          <p className="text-sm">向量嵌入 + LLM 分析中，請稍候…</p>
        </div>
      )}

      {/* Error */}
      {!loading && error && (
        <div className="bg-red-50 rounded-xl border border-red-200 p-5">
          <p className="text-sm font-medium text-red-700 mb-1">連接錯誤</p>
          <p className="text-sm text-red-600">{error}</p>
          <p className="mt-2 text-xs text-red-400">
            請確認後端已啟動：<code>cd backend &amp;&amp; OPENAI_API_KEY=sk-... npm run dev</code>
          </p>
        </div>
      )}

      {/* Results */}
      {!loading && result && (
        <div className="space-y-4">
          {/* Detected topics */}
          <div className="bg-white rounded-xl border border-gray-200 p-4">
            <h3 className="text-sm font-semibold text-gray-700 mb-2">🎯 偵測主題</h3>

                  {TOPIC_LABELS[t] || t}
                </span>
              ))}
            </div>
          </div>

          {/* Used facts */}
          <div className="bg-white rounded-xl border border-gray-200 p-4">
            <h3 className="text-sm font-semibold text-gray-700 mb-2">
              📋 注入知識 <span className="font-normal text-gray-400">({result.used_facts.length} 條)</span>
            </h3>
            {result.used_facts.length === 0 ? (
              <p className="text-xs text-gray-400">無相關已確認知識可注入</p>
            ) : (

                {result.used_facts.map((fact, i) => (

          <div className="bg-white rounded-xl border border-gray-200 p-4">

      {!loading && !result && !error && (
        <div className="bg-white rounded-xl border border-gray-200 p-10 text-center">
          <p className="text-4xl mb-3">📋</p>
          <p className="text-sm text-gray-400">貼上 EDB 通告，由 AI 自動分析並提供相關 EDB 規定建議</p>
          <p className="text-xs text-gray-300 mt-1">使用語意向量嵌入 (text-embedding-3-small) 偵測主題</p>
        </div>
      )}
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [reviewState, setReviewState] = useState(null);
  const [dataReady, setDataReady] = useState(false);

  useEffect(() => {
    fetch('data.json')
      .then(r => r.json())
      .then(initialData => {
        const snapshot = loadLocalSnapshot();
        if (snapshot?.data) {
          snapshot.data._meta = deepClone(initialData._meta);
          setData(snapshot.data);
        } else {
          setData(deepClone(initialData));
        }
        setReviewState(snapshot?.reviewState || deepClone(INITIAL_REVIEW_STATE));
        setDataReady(true);
      })
      .catch(err => console.error('Failed to load data.json:', err));
  }, []);
  const [activeTopic, setActiveTopic] = useState('finance');
  const [filterRole, setFilterRole] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all'); // 'all' | 'draft' | 'approved'
  const [editModal, setEditModal] = useState({ isOpen: false, editData: null });
  const [exportModal, setExportModal] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [viewMode, setViewMode] = useState('knowledge'); // 'knowledge' | 'guidelines' | 'qa'
  const [adminMode, setAdminMode] = useState(false);
  const [showAdminModal, setShowAdminModal] = useState(false);

  // Loading screen while data.json is fetched
  if (!dataReady) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'12px'}}>
        <div style={{width:'40px',height:'40px',border:'4px solid #ccfbf1',borderTop:'4px solid #0d9488',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></div>
        <p style={{color:'#0d9488',fontSize:'0.95rem',margin:0}}>載入知識庫中…</p>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  const displayVersion = useMemo(() => {
    return `v${data._meta?.version || '0.0.0'}`;
  }, [data]);

  useEffect(() => {
    try {
      localStorage.setItem(
        LOCAL_SNAPSHOT_KEY,
        JSON.stringify(buildAdminSnapshot(data, reviewState))
      );
    } catch (error) {
      console.warn('Failed to persist local admin snapshot:', error);
    }
  }, [data, reviewState]);

  // Stats
  const stats = useMemo(() => {
    let totalFacts = 0; let topicCount = 0; const rolesUsed = new Set();
    let draftCount = 0; let approvedCount = 0;
    Object.entries(data).forEach(([k, v]) => {
      if (k === '_meta') return;
      topicCount++;
      Object.entries(v).forEach(([rk, fs]) => {
        if (rk.startsWith('_')) return;
        rolesUsed.add(rk);
        if (Array.isArray(fs)) {
          totalFacts += fs.length;
          fs.forEach((_, i) => {
            const s = reviewState[makeKey(k, rk, i)];
            if (s === 'draft') draftCount++;
            else approvedCount++;
          });
        }
      });
    });
    return { totalFacts, topicCount, rolesUsed: rolesUsed.size, draftCount, approvedCount };
  }, [data, reviewState]);

  // Topic list
  const topics = useMemo(() => {
    return Object.entries(data)
      .filter(([k]) => k !== '_meta')
      .map(([id, td]) => {
        let factCount = 0; let draftCount = 0;
        Object.entries(td).filter(([k]) => !k.startsWith('_')).forEach(([rk, fs]) => {
          if (!Array.isArray(fs)) return;
          factCount += fs.length;
          fs.forEach((_, i) => {
            if (reviewState[makeKey(id, rk, i)] === 'draft') draftCount++;
          });
        });
        return { id, label: td._label || id, factCount, draftCount };
      });
  }, [data, reviewState]);

  // Current topic data
  const currentTopic = data[activeTopic] || {};

  // Filtered facts
  const filteredFacts = useMemo(() => {
    const result = [];
    ROLE_ORDER.forEach(roleId => {
      if (filterRole !== 'all' && filterRole !== roleId) return;
      const facts = currentTopic[roleId];
      if (!Array.isArray(facts)) return;
      facts.forEach((fact, idx) => {
        if (searchQuery && !fact.includes(searchQuery)) return;
        const status = reviewState[makeKey(activeTopic, roleId, idx)] || 'approved';
        if (filterStatus !== 'all' && filterStatus !== status) return;
        // Resolve source reference
        const srcMap = currentTopic._sourceMap || {};
        const srcIdx = srcMap[`${roleId}.${idx}`];
        const sourceRef = (srcIdx !== undefined && currentTopic._sources?.[srcIdx])
          ? currentTopic._sources[srcIdx] : null;
        result.push({ roleId, fact, index: idx, status, sourceRef });
      });
    });
    return result;
  }, [currentTopic, filterRole, filterStatus, searchQuery, activeTopic, reviewState]);

  // Draft count for current topic
  const currentDraftCount = useMemo(() => {
    return filteredFacts.filter(f => f.status === 'draft').length;
  }, [filteredFacts]);

  // CRUD handlers
  const handleEdit = useCallback((topicId, roleId, index) => {
    const fact = data[topicId]?.[roleId]?.[index] || '';
    setEditModal({ isOpen: true, editData: { topicId, roleId, index, fact, isNew: false } });
  }, [data]);

  const handleDelete = useCallback((topicId, roleId, index) => {
    if (!confirm('確定刪除此事實？')) return;
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      next[topicId][roleId].splice(index, 1);
      if (next[topicId][roleId].length === 0 && roleId !== 'all_roles') {
        delete next[topicId][roleId];
      }
      return next;
    });
    // Rebuild review keys for this topic+role
    setReviewState(prev => {
      const next = { ...prev };
      // Remove the deleted key
      delete next[makeKey(topicId, roleId, index)];
      // Re-index subsequent facts
      const oldFacts = data[topicId]?.[roleId] || [];
      for (let i = index + 1; i < oldFacts.length; i++) {
        const oldKey = makeKey(topicId, roleId, i);
        const newKey = makeKey(topicId, roleId, i - 1);
        next[newKey] = prev[oldKey] || 'approved';
        delete next[oldKey];
      }
      return next;
    });
  }, [data]);

  const handleAdd = useCallback(() => {
    setEditModal({
      isOpen: true,
      editData: { topicId: activeTopic, roleId: 'all_roles', index: -1, fact: '', isNew: true }
    });
  }, [activeTopic]);

  const handleChangeRole = useCallback((topicId, roleId, index) => {
    const fact = data[topicId]?.[roleId]?.[index] || '';
    setEditModal({
      isOpen: true,
      editData: { topicId, roleId, index, fact, isNew: false, isRoleChange: true, origRoleId: roleId }
    });
  }, [data]);

  const handleSave = useCallback((editData) => {
    const { topicId, roleId, index, fact, isNew, isRoleChange, origRoleId } = editData;

    if (isRoleChange && origRoleId && origRoleId !== roleId) {
      // Move fact to a different role
      setData(prev => {
        const next = JSON.parse(JSON.stringify(prev));
        // Remove from old role
        next[topicId][origRoleId].splice(index, 1);
        if (next[topicId][origRoleId].length === 0 && origRoleId !== 'all_roles') {
          delete next[topicId][origRoleId];
        }
        // Add to new role
        if (!next[topicId][roleId]) next[topicId][roleId] = [];
        next[topicId][roleId].push(fact);
        next._meta.updated = new Date().toISOString().split('T')[0];
        return next;
      });
      // Update review state
      setReviewState(prev => {
        const next = { ...prev };
        const oldStatus = prev[makeKey(topicId, origRoleId, index)] || 'draft';
        // Remove old key and re-index
        delete next[makeKey(topicId, origRoleId, index)];
        const oldFacts = data[topicId]?.[origRoleId] || [];
        for (let i = index + 1; i < oldFacts.length; i++) {
          next[makeKey(topicId, origRoleId, i - 1)] = prev[makeKey(topicId, origRoleId, i)] || 'approved';
          delete next[makeKey(topicId, origRoleId, i)];
        }
        // Add to new role at end
        const newRoleFacts = data[topicId]?.[roleId] || [];
        next[makeKey(topicId, roleId, newRoleFacts.length)] = oldStatus;
        return next;
      });
    } else if (isNew) {
      setData(prev => {
        const next = JSON.parse(JSON.stringify(prev));
        if (!next[topicId][roleId]) next[topicId][roleId] = [];
        next[topicId][roleId].push(fact);
        next._meta.updated = new Date().toISOString().split('T')[0];
        return next;
      });
      // New facts are drafts
      setReviewState(prev => {
        const newIdx = (data[topicId]?.[roleId] || []).length;
        return { ...prev, [makeKey(topicId, roleId, newIdx)]: 'draft' };
      });
    } else {
      setData(prev => {
        const next = JSON.parse(JSON.stringify(prev));
        next[topicId][roleId][index] = fact;
        next._meta.updated = new Date().toISOString().split('T')[0];
        return next;
      });
    }
  }, [data]);

  // Review handlers
  const handleApprove = useCallback((topicId, roleId, index) => {
    setReviewState(prev => ({ ...prev, [makeKey(topicId, roleId, index)]: 'approved' }));
  }, []);

  const handleReject = useCallback((topicId, roleId, index) => {
    setReviewState(prev => ({ ...prev, [makeKey(topicId, roleId, index)]: 'draft' }));
  }, []);

  // Batch approve all visible drafts
  const handleBatchApprove = useCallback(() => {
    const drafts = filteredFacts.filter(f => f.status === 'draft');
    if (drafts.length === 0) return;
    if (!confirm(`確認批量通過 ${drafts.length} 條待審核事實？`)) return;
    setReviewState(prev => {
      const next = { ...prev };
      drafts.forEach(f => { next[makeKey(activeTopic, f.roleId, f.index)] = 'approved'; });
      return next;
    });
  }, [filteredFacts, activeTopic]);

  // Validation
  const validation = useMemo(() => {
    const errors = [];
    const VALID_TOPICS = new Set(['finance','hr','curriculum','activity','student','it','general']);
    const VALID_ROLES = new Set(['all_roles','principal','vice_principal','panel_chair','subject_head','teacher','eo_admin','supplier']);
    Object.entries(data).forEach(([tid, td]) => {
      if (tid === '_meta') return;
      if (!VALID_TOPICS.has(tid)) errors.push(`Unknown topic: ${tid}`);
      Object.entries(td).forEach(([rk, fs]) => {
        if (rk.startsWith('_')) return;
        if (!VALID_ROLES.has(rk)) errors.push(`${tid}.${rk}: unknown role`);
        if (!Array.isArray(fs)) return;
        if (fs.length > 5) errors.push(`${tid}.${rk}: ${fs.length} facts > 5`);
        fs.forEach((f, i) => {
          if (f.length > 80) errors.push(`${tid}.${rk}[${i}]: ${f.length} chars > 80`);
        });
      });
    });
    return errors;
  }, [data]);

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="bg-white border-b border-gray-200 px-6 py-4 shadow-sm">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div>
            <h1 className="text-xl font-bold text-gray-800">EDB 學校管理知識中心</h1>
            <p className="text-xs text-gray-500 mt-0.5">學校管理知識中心 — {displayVersion}</p>
          </div>
          <div className="flex items-center gap-3 flex-wrap justify-end">
            {/* Admin toggle */}
            <button
              onClick={() => adminMode ? setAdminMode(false) : setShowAdminModal(true)}
              title={adminMode ? '登出管理員模式' : '管理員登入'}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border transition-all
                ${adminMode
                  ? 'bg-amber-50 text-amber-700 border-amber-300 hover:bg-amber-100'
                  : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}>
              {adminMode ? '🔓 管理員' : '🔒 登入'}
            </button>
            {/* View mode toggle */}
            <div className="flex rounded-lg border border-gray-200 overflow-hidden">
              <button onClick={() => setViewMode('knowledge')}
                      className={`filter-tab px-3 py-1.5 text-xs font-medium ${viewMode === 'knowledge' ? 'active-tab' : 'text-gray-600'}`}>
                知識庫
              </button>
              <button onClick={() => setViewMode('guidelines')}
                      className={`filter-tab px-3 py-1.5 text-xs font-medium ${viewMode === 'guidelines' ? 'active-tab' : 'text-gray-600'}`}>
                指引文件庫 ({GUIDELINES_REGISTRY.length})
              </button>
              <button onClick={() => setViewMode('qa')}
                      className={`filter-tab px-3 py-1.5 text-xs font-medium ${viewMode === 'qa' ? 'bg-indigo-600 text-white' : 'text-gray-600'}`}>
                🔍 智能搜尋
              </button>
              <button onClick={() => setViewMode('circular')}
                      className={`filter-tab px-3 py-1.5 text-xs font-medium ${viewMode === 'circular' ? 'bg-violet-600 text-white' : 'text-gray-600'}`}>
                📋 通告分析
              </button>
            </div>
            {viewMode === 'knowledge' && stats.draftCount > 0 && (
              <div className="flex items-center gap-1 text-xs px-3 py-1.5 rounded-full bg-yellow-100 text-yellow-700">
                {stats.draftCount} 條待審核
              </div>
            )}
            {viewMode === 'knowledge' && (
              <div className={`flex items-center gap-1 text-xs px-3 py-1.5 rounded-full ${validation.length === 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                {validation.length === 0 ? '驗證通過' : `${validation.length} 個問題`}
              </div>
            )}
            {viewMode === 'knowledge' && adminMode && (
              <button onClick={() => setExportModal(true)}
                      className="export-btn px-4 py-2 text-sm rounded-lg font-medium shadow-sm">
                匯出 / 備份
              </button>
            )}
            {viewMode === 'qa' && (
              <div className="flex items-center gap-1 text-xs px-3 py-1.5 rounded-full bg-indigo-100 text-indigo-700">
                {stats.totalFacts} 條事實可搜尋
              </div>
            )}
            {viewMode === 'circular' && (
              <div className="flex items-center gap-1 text-xs px-3 py-1.5 rounded-full bg-violet-100 text-violet-700">
                語意 RAG · 本地後端
              </div>
            )}
          </div>
        </div>
      </header>

      <div className="max-w-7xl mx-auto flex gap-6 p-6">
        {/* Sidebar - only show in knowledge mode */}
        {viewMode === 'knowledge' && <aside className="w-64 flex-shrink-0">
          {/* Stats */}
          <div className="stat-card rounded-xl p-4 mb-3 border border-teal-200">
            <h3 className="text-xs font-bold text-teal-700 mb-3">知識庫統計</h3>
            <div className="grid grid-cols-3 gap-2 text-center">
              <div>
                <div className="text-2xl font-bold text-teal-800">{stats.topicCount}</div>
                <div className="text-xs text-teal-600">範疇</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-teal-800">{stats.totalFacts}</div>
                <div className="text-xs text-teal-600">事實</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-teal-800">{stats.rolesUsed}</div>
                <div className="text-xs text-teal-600">角色</div>
              </div>
            </div>
          </div>

          {/* Review stats */}
          <div className="review-stat rounded-xl p-4 mb-4 border border-yellow-200">
            <h3 className="text-xs font-bold text-yellow-700 mb-2">審核狀態</h3>
            <div className="grid grid-cols-2 gap-2 text-center">
              <div>
                <div className="text-xl font-bold text-green-700">{stats.approvedCount}</div>
                <div className="text-xs text-green-600">已確認</div>
              </div>
              <div>
                <div className="text-xl font-bold text-yellow-700">{stats.draftCount}</div>
                <div className="text-xs text-yellow-600">待審核</div>
              </div>
            </div>
          </div>

          {/* Topic list */}
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-100">
              <h3 className="text-xs font-bold text-gray-500">範疇</h3>
            </div>
            {topics.map(t => (
              <button key={t.id}
                      onClick={() => { setActiveTopic(t.id); setFilterRole('all'); setSearchQuery(''); setFilterStatus('all'); }}
                      className={`topic-btn w-full text-left px-4 py-3 border-b border-gray-50 flex items-center justify-between ${activeTopic === t.id ? 'active' : 'hover:bg-gray-50'}`}>
                <span className="text-sm">{t.label}</span>
                <span className="flex items-center gap-1">
                  {t.draftCount > 0 && (
                    <span className="text-xs px-1.5 py-0.5 rounded-full bg-yellow-100 text-yellow-700">{t.draftCount}</span>
                  )}
                  <span className={`text-xs px-2 py-0.5 rounded-full ${activeTopic === t.id ? 'bg-teal-700 text-teal-100' : 'bg-gray-100 text-gray-500'}`}>
                    {t.factCount}
                  </span>
                </span>
              </button>
            ))}
          </div>

          {/* Role filter */}
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden mt-4">
            <div className="px-4 py-3 border-b border-gray-100">
              <h3 className="text-xs font-bold text-gray-500">角色篩選</h3>
            </div>
            <button onClick={() => setFilterRole('all')}
                    className={`w-full text-left px-4 py-2 text-sm border-b border-gray-50 ${filterRole === 'all' ? 'bg-teal-50 text-teal-700 font-medium' : 'hover:bg-gray-50'}`}>
              全部角色
            </button>
            {ROLE_ORDER.map(r => {
              const hasFacts = Array.isArray(currentTopic[r]) && currentTopic[r].length > 0;
              return (
                <button key={r}
                        onClick={() => setFilterRole(r)}
                        disabled={!hasFacts}
                        className={`w-full text-left px-4 py-2 text-sm border-b border-gray-50 flex items-center justify-between
                          ${filterRole === r ? 'bg-teal-50 text-teal-700 font-medium' : ''}
                          ${hasFacts ? 'hover:bg-gray-50' : 'text-gray-300 cursor-not-allowed'}`}>
                  <span>{ROLE_CONFIG[r].label}</span>
                  {hasFacts && <span className="text-xs text-gray-400">{currentTopic[r].length}</span>}
                </button>
              );
            })}
          </div>
        </aside>}

        {/* Main content */}
        {viewMode === 'guidelines' ? (
          <GuidelinesPanel />
        ) : viewMode === 'qa' ? (
          <QAPanel data={data} />
        ) : viewMode === 'circular' ? (
          <CircularAnalysisPanel />
        ) : (
        <main className="flex-1 min-w-0">
          {/* Topic header */}
          <div className="bg-white rounded-xl border border-gray-200 p-5 mb-4">
            <div className="flex items-center justify-between gap-3 mb-3">
              <h2 className="text-lg font-bold text-gray-800">{currentTopic._label || activeTopic}</h2>
              <div className="flex items-center gap-2 flex-wrap justify-end">
                {adminMode && (
                  <button onClick={() => setExportModal(true)}
                          className="export-btn px-3 py-1.5 text-sm rounded-lg font-medium shadow-sm">
                    匯出 / 備份
                  </button>
                )}
                {adminMode && (
                  <button onClick={handleAdd}
                          className="px-3 py-1.5 bg-teal-50 text-teal-700 text-sm rounded-lg hover:bg-teal-100 border border-teal-200 font-medium">
                    + 新增事實
                  </button>
                )}
              </div>
            </div>
            {currentTopic._keywords_zh && currentTopic._keywords_zh.length > 0 && (
              <div className="flex flex-wrap gap-1 mb-3">
                {currentTopic._keywords_zh.map((kw, i) => (
                  <span key={i} className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">{kw}</span>
                ))}
              </div>
            )}

            {/* Search + Status filter row */}
            <div className="flex items-center gap-3">
              <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                     placeholder="搜尋事實..."
                     className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              {searchQuery && (
                <button onClick={() => setSearchQuery('')} className="text-xs text-gray-400 hover:text-gray-600">清除</button>
              )}
              <div className="flex rounded-lg border border-gray-200 overflow-hidden">
                {[
                  { key: 'all', label: '全部' },
                  { key: 'draft', label: '待審核' },
                  { key: 'approved', label: '已確認' },
                ].map(tab => (
                  <button key={tab.key}
                          onClick={() => setFilterStatus(tab.key)}
                          className={`filter-tab px-3 py-1.5 text-xs font-medium ${filterStatus === tab.key ? 'active-tab' : 'text-gray-600'}`}>
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Batch approve bar */}
          {currentDraftCount > 0 && filterStatus !== 'approved' && (
            <div className="batch-bar rounded-xl border border-teal-200 p-3 mb-4 flex items-center justify-between">
              <span className="text-sm text-teal-700">
                目前顯示 <strong>{currentDraftCount}</strong> 條待審核事實
              </span>
              {adminMode && (
                <button onClick={handleBatchApprove}
                        className="px-4 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 font-medium">
                  全部確認通過
                </button>
              )}
            </div>
          )}

          {/* Facts list */}
          <div className="space-y-3">
            {filteredFacts.length === 0 ? (
              <div className="bg-white rounded-xl border border-gray-200 p-8 text-center text-gray-400">
                <p className="text-sm">此篩選條件下沒有事實條目</p>
              </div>
            ) : (
              filteredFacts.map((item, i) => (
                <FactCard key={`${item.roleId}-${item.index}-${i}`}
                          fact={item.fact} index={item.index} roleId={item.roleId}
                          topicId={activeTopic} status={item.status}
                          sourceRef={item.sourceRef}
                          onEdit={handleEdit} onDelete={handleDelete}
                          onApprove={handleApprove} onReject={handleReject}
                          onChangeRole={handleChangeRole}
                          isAdmin={adminMode} />
              ))
            )}
          </div>

          {/* Sources */}
          <SourceList sources={currentTopic._sources} />
        </main>
        )}
      </div>

      {/* Footer */}
      <footer className="border-t border-gray-200 bg-white px-6 py-3 mt-8">
        <div className="max-w-7xl mx-auto flex items-center justify-between text-xs text-gray-400">
          <span>EDB 學校管理知識中心 {displayVersion} | 最後更新: {data._meta?.updated || data._meta?.created}</span>
          <span>Facts: {stats.totalFacts} ({stats.approvedCount} approved, {stats.draftCount} draft) | Topics: {stats.topicCount}</span>
        </div>
      </footer>

      {/* Modals */}
      <EditModal isOpen={editModal.isOpen} onClose={() => setEditModal({ isOpen: false, editData: null })}
                 onSave={handleSave} editData={editModal.editData} />
      <ExportModal isOpen={exportModal} onClose={() => setExportModal(false)} data={data} reviewState={reviewState} />
      <AdminPasswordModal isOpen={showAdminModal} onClose={() => setShowAdminModal(false)}
                          onSuccess={() => setAdminMode(true)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
